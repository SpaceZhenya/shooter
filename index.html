<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIRESTORM — 3D Shooter</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div id="blocker">
        <div id="instructions">
            <h1>FIRESTORM</h1>
            <p class="subtitle">Городской 3D шутер на выживание</p>
            <button id="startBtn">Начать игру</button>
            <div id="controls">
                <p><b>W A S D</b> &nbsp;—&nbsp; передвижение</p>
                <p><b>Shift</b> &nbsp;—&nbsp; бег</p>
                <p><b>ЛКМ</b> &nbsp;—&nbsp; стрельба</p>
                <p><b>R</b> &nbsp;—&nbsp; перезарядка</p>
            </div>
            <div id="loading-info" style="margin-top:12px;font-size:12px;color:#555;">Загрузка моделей...</div>
        </div>
    </div>

    <div id="hud">
        <div id="crosshair">
            <div class="crosshair-dot"></div>
            <div class="crosshair-line crosshair-top"></div>
            <div class="crosshair-line crosshair-bottom"></div>
            <div class="crosshair-line crosshair-left"></div>
            <div class="crosshair-line crosshair-right"></div>
        </div>
        <div id="score"><span id="scoreVal">0</span> очков</div>
        <div id="health-bar"><div id="health-fill"></div></div>
        <div id="health">❤️ <span id="healthVal">100</span></div>
        <div id="ammo"><span id="ammoVal">30</span> <span>/ 30</span></div>
        <div id="wave">Волна <span id="waveVal">1</span></div>
        <div id="reload">ПЕРЕЗАРЯДКА...</div>
    </div>

    <div id="damage-overlay"></div>

    <div id="gameOver">
        <h1>УБИТ</h1>
        <p class="subtitle">Ваша вахта окончена</p>
        <p>Набрано <span id="finalScore">0</span> очков</p>
        <p style="font-size:16px;color:#666;margin-top:4px;">Волна <span id="finalWave">1</span></p>
        <button id="restartBtn">Новый забег</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
